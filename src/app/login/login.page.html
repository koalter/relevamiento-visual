<ion-content>
  <img src="../../assets/logo.png" class="Logo">
  <form>
    <section class="Container container mt-4 p-4">
      <ion-text color="medium">
        <h1 class="mb-4">BIENVENIDO</h1>
      </ion-text>
      <ion-item>
        <ion-label class="Label" position="floating">Dirección de correo</ion-label>
        <ion-input type="email" [(ngModel)]="this.email" name="email"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label class="Label" position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="this.clave" name="clave"></ion-input>
      </ion-item>
      <!-- <input type="email" class="Input shadow mb-2 py-2 form-control" id="floatingInput" placeholder="Dirección de correo" [(ngModel)]="this.email" name="email"> -->
      <!-- <input type="password" class="Input shadow mb-2 py-2 form-control" id="floatingPassword" placeholder="Contraseña" [(ngModel)]="this.clave" name="clave"> -->
      <ion-button (click)="iniciarSesion()" strong="true" size="large" expand="full" color="danger" class="mt-3 mb-5">Iniciar sesión</ion-button>
      
      <ion-button (click)="llenarCampos('test1@example.com', 'password')" expand="full" class="my-3" color="primary">Ingresar como test1</ion-button>
      <ion-button (click)="llenarCampos('test2@example.com', 'password')" expand="full" class="my-3" color="secondary">Ingresar como test2</ion-button>
      <ion-button (click)="llenarCampos('test3@example.com', 'password')" expand="full" class="my-3" color="tertiary">Ingresar como test3</ion-button>
    </section>

  </form>
</ion-content>
